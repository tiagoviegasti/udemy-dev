<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aula 35 | Exercício 2</title>
</head>
<body>
  <h1>Exercício de formulários</h1>
  <form action="" method="GET">
    <fieldset>
      <legend>Dados pessoais</legend>
      <label for="nome">Nome</label><br>
      <input id="nome" type="text" name="nome"><br>
      <label for="email">Email</label><br>
      <input id="email" type="email" name="email"><br>
      <input type="checkbox" name="receber-email">Quero receber email<br><br>
      <label for="senha">Senha</label><br>
      <input id="senha" type="password" name="senha">
    </fieldset>
    <fieldset>
      <legend>Informações adicionais</legend>
      <input id="cpf" type="radio" name="pessoa" value="cpf">
      <label for="cpf">Pessoa Física</label>
      <input id="cnpj" type="radio" name="pessoa" value="cnpj">
      <label for="cnpj">Pessoa Jurídica</label>
    </fieldset>
    <br>
    <input type="submit" value="Cadastrar">
  </form>
  
</body>
</html>
