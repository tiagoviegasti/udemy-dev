<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface de login do Trello</title>

    <!--
      <script src="https://unpkg.com/@codans/trello"></script>
    -->

</head>
<body>
  <img src="img/trello.svg" alt="trello-logo" width="200">
  <form action="">
    <h1>Fazer login no Trello</h1>
    <input type="email" name="email" placeholder="Insira o e-mail"><br>
    <input type="password" name="senha" placeholder="Insira a senha"><br>
    <button type="submit">Fazer login</button><br>
    <p>Ou</p>
    <button name="login-google">
      <img src="img/google.svg" width="20" alt="continuar-com-o-google">
      Continuar com o Google
    </button><br><br>
    <button name="login-microsoft">
      <img src="img/microsoft.svg" width="20" alt="continuar-com-a-microsoft">
      Continuar com a Microsoft
    </button><br><br>
    <button name="login-apple">
      <img src="img/apple.svg" width="20" alt="continuar-com-a-apple">
      Continuar com a Apple
    </button><br><br>
    <button name="login-slack">
      <img src="img/slack.svg" width="20" alt="continuar-com-o-slack">
      Continuar com o Slack
    </button>
  </form>
  
  <img src="img/atlassian.svg" width="200" alt="">
  <img src="img/analytics.svg" width="200" alt="">
  <img src="img/interactive.svg" width="200" alt="">
</body>
</html>
